<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Curator AI</title>

<style>
:root { 
    --bg: #0f172a; 
    --card: #1e293b; 
    --accent: #fbbf24; 
    --text: #f8fafc; 
}

body { 
    font-family: Arial, sans-serif;
    background: var(--bg); 
    color: var(--text); 
    display: flex; 
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

/* 🔥 CARD FLEX FIX */
.card { 
    background: var(--card);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 800px;
    min-height: 90vh;

    display: flex;
    flex-direction: column;

    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

/* IMAGE */
#art-image {
    width: 100%;
    margin-top: 20px;
    border-radius: 10px;
    display: none;
}

/* AI BOX */
.ai-section {
    margin-top: 20px;
    text-align: left;
    display: none;
    background: rgba(0,0,0,0.2);
    padding: 15px;
    border-radius: 10px;
}

#ai-fact {
    white-space: pre-line;
}

/* 🔥 PUSH BUTTON DOWN */
.spacer {
    flex: 1;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
}

button:disabled {
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="card">
    <h2>🎨 Art Curator AI</h2>

    <select id="category-select">
        <option value="Impressionism">Impressionism</option>
        <option value="Renaissance">Renaissance</option>
        <option value="Ancient Greek Art">Ancient Greek Art</option>
        <option value="Japanese Art">Japanese Art</option>
        <option value="Surrealism">Surrealism</option>
    </select>

    <img id="art-image">

    <div class="ai-section" id="ai-container">
        <p id="ai-fact"></p>
    </div>

    <!-- 🔥 pushes button to bottom -->
    <div class="spacer"></div>

    <button id="next-btn" onclick="getArt()">ΕΠΟΜΕΝΟ</button>
</div>

<script>

async function getArt() {
    const btn = document.getElementById('next-btn');
    const img = document.getElementById('art-image');
    const category = document.getElementById('category-select').value;
    const aiContainer = document.getElementById('ai-container');

    btn.disabled = true;
    btn.innerText = "Loading...";
    aiContainer.style.display = "none";

    try {
        const page = Math.floor(Math.random() * 30) + 1;

        const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${category}&page=${page}&limit=12&fields=title,artist_title,image_id`);
        const data = await res.json();

        const valid = data.data?.filter(a => a.image_id);
        if (!valid || valid.length === 0) throw new Error("No art found");

        const art = valid[Math.floor(Math.random() * valid.length)];

        document.querySelector("h2").innerText = art.title;

        img.src = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;
        img.style.display = "block";

        img.onload = () => {
            btn.disabled = false;
            btn.innerText = "ΕΠΟΜΕΝΟ";
            getAI(art.title, art.artist_title);
        };

    } catch (err) {
        console.error(err);
        btn.innerText = "ΞΑΝΑ";
        btn.disabled = false;
    }
}

async function getAI(title, artist) {
    const box = document.getElementById('ai-container');
    const text = document.getElementById('ai-fact');

    box.style.display = "block";
    text.innerText = "AI thinking...";

    try {
        const res = await fetch("https://art-b2pg.onrender.com/api/groq", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ title, artist })
        });

        const data = await res.json();

        if (!data || !data.choices || !data.choices[0]) {
            text.innerText = "AI error";
            return;
        }

        let content = data.choices[0].message.content;

        text.innerHTML = content
            .replace("🎯 Fun Fact:", "<b>🎯 Fun Fact:</b><br>")
            .replace("🎨 Ανάλυση:", "<br><br><b>🎨 Ανάλυση:</b><br>")
            .replace("🧠 Context:", "<br><br><b>🧠 Context:</b><br>");

    } catch (e) {
        text.innerText = "AI error...";
    }
}

</script>

</body>
</html>
