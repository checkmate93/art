<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Curator AI - TV Edition</title>

<style>
/* =========================================
   1. ΒΑΣΙΚΕΣ ΜΕΤΑΒΛΗΤΕΣ & RESET
========================================= */
:root { 
    --bg: #0f172a; 
    --panel-bg: #1e293b; 
    --accent: #fbbf24; 
    --text: #f8fafc; 
    --text-muted: #cbd5e1;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
    font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    width: 100vw;
    height: 100vh;
    overflow: hidden; 
}

/* =========================================
   2. TV SAFE AREA & LAYOUT
========================================= */
#tv-safe-area {
    padding: 30px; 
    width: 100%;
    height: 100%;
    position: relative;
}

#main-grid {
    display: flex;
    flex-direction: row; 
    gap: 30px; 
    height: 100%;
    width: 100%;
}

/* =========================================
   3. ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ (Εικόνα)
========================================= */
.left-panel {
    flex: 6; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--panel-bg);
    border-radius: 15px;
    padding: 10px; 
    position: relative;
    box-shadow: var(--shadow);
}

#art-image { 
    width: 100%;
    height: calc(100% - 45px); 
    object-fit: contain; 
    border-radius: 8px;
    display: none;
}

#enter-canvas-btn {
    margin-top: 10px;
    background: rgba(15, 23, 42, 0.8);
    color: white;
    border: 1px solid var(--accent);
    padding: 6px 16px; 
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    z-index: 10; 
}

/* =========================================
   4. ΔΕΞΙΑ ΣΤΗΛΗ (Controls)
========================================= */
.right-panel {
    flex: 4; 
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
}

select { 
    width: 100%; 
    padding: 8px 12px; 
    border-radius: 8px; 
    background: #0f172a; 
    color: white; 
    border: 1px solid #334155; 
    font-size: 16px; 
    cursor: pointer;
    position: relative;
    z-index: 20; 
    flex-shrink: 0;
}

.info-box {
    flex-grow: 1; 
    background: var(--panel-bg);
    border-radius: 15px;
    padding: 20px;
    overflow-y: auto; 
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
}

.info-box::-webkit-scrollbar { width: 6px; }
.info-box::-webkit-scrollbar-track { background: transparent; }
.info-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

#art-title { 
    font-size: 22px; 
    font-weight: bold; 
    margin-bottom: 5px;
    line-height: 1.2;
}

.artist-name { 
    font-size: 16px; 
    color: var(--accent); 
    margin-bottom: 15px; 
}

#ai-fact { 
    font-size: 18px; 
    line-height: 1.5;
    color: var(--text-muted);
}
#ai-fact strong { color: white; }

.btn-group {
    display: flex;
    flex-direction: row; 
    gap: 10px;
    flex-shrink: 0;
}

button.control-btn {
    flex: 1; 
    border: none; 
    padding: 12px 5px; 
    border-radius: 10px; 
    font-size: 16px; 
    font-weight: bold;
    cursor: pointer; 
    position: relative;
    z-index: 10;
    text-align: center;
}

#next-btn { background: var(--accent); color: #0f172a; }
#next-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

#auto-btn { background: #334155; color: white; border: 1px solid #475569; }
#auto-btn.active { background: #ef4444; border-color: #ef4444; }

/* =========================================
   5. ΛΕΙΤΟΥΡΓΙΑ ΚΑΜΒΑ (Fullscreen Overlay)
========================================= */
#fullscreen-overlay {
    display: none; 
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black; 
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

#fullscreen-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

#fixed-back-btn {
    position: absolute; 
    top: 30px; 
    left: 30px; 
    background: rgba(239, 68, 68, 0.9);
    color: white;
    padding: 12px 24px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    cursor: pointer;
    z-index: 10000;
}
#fixed-back-btn:hover { background: #dc2626; }
</style>
</head>

<body>

<div id="fullscreen-overlay">
    <button id="fixed-back-btn" onclick="exitCanvas()">⬅ ΕΠΙΣΤΡΟΦΗ</button>
    <img id="fullscreen-image">
</div>

<div id="tv-safe-area">
    <div id="main-grid">
        <div class="left-panel">
            <img id="art-image">
            <button id="enter-canvas-btn" onclick="enterCanvas()">🔍 Καμβάς</button>
        </div>

        <div class="right-panel">
            <select id="category-select" onchange="getArt()">
                <option value="Impressionism">🎨 Ιμπρεσιονισμός</option>
                <option value="Renaissance">🏰 Αναγέννηση</option>
                <option value="Ancient Greek Art">🏺 Αρχαία Ελληνική Τέχνη</option>
                <option value="Japanese Art">🌊 Ιαπωνική Τέχνη</option>
                <option value="Surrealism">👁️ Σουρεαλισμός</option>
            </select>

            <div class="info-box">
                <h1 id="art-title">Curiosity Gallery</h1>
                <div id="artist-name" class="artist-name">Επιλέξτε...</div>
                <div id="ai-fact">Το AI Curator φορτώνει...</div>
            </div>

            <div class="btn-group">
                <button id="next-btn" class="control-btn" onclick="getArt()">ΕΠΟΜΕΝΟ</button>
                <button id="auto-btn" class="control-btn" onclick="toggleAutoMode()">⏱️ AUTO (1.5λ)</button>
            </div>
        </div>
    </div>
</div>

<script>
/* --- ΛΕΙΤΟΥΡΓΙΑ ΚΑΜΒΑ --- */
function enterCanvas() {
    const mainImg = document.getElementById('art-image');
    const overlay = document.getElementById('fullscreen-overlay');
    const fullImg = document.getElementById('fullscreen-image');
    fullImg.src = mainImg.src;
    overlay.style.display = 'flex';
}

function exitCanvas() {
    document.getElementById('fullscreen-overlay').style.display = 'none';
}

/* --- ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ (1.5 λεπτό) --- */
let autoInterval;
let isAutoMode = false;

function toggleAutoMode() {
    const btn = document.getElementById('auto-btn');
    isAutoMode = !isAutoMode;

    if (isAutoMode) {
        btn.classList.add('active');
        btn.innerText = "🛑 ΔΙΑΚΟΠΗ";
        getArt(); 
        autoInterval = setInterval(getArt, 90000); 
    } else {
        btn.classList.remove('active');
        btn.innerText = "⏱️ AUTO (1.5λ)";
        clearInterval(autoInterval);
    }
}

/* --- API & ΦΟΡΤΩΣΗ (ΜΕ ΕΞΥΠΝΟ AUTO-RETRY) --- */
async function getArt(retryCount = 0) {
    const nextBtn = document.getElementById('next-btn');
    const catSelect = document.getElementById('category-select');
    const img = document.getElementById('art-image');
    const category = catSelect.value;
    const titleEl = document.getElementById('art-title');
    const artistEl = document.getElementById('artist-name');
    const factEl = document.getElementById('ai-fact');

    // Κλειδώνουμε το UI μόνο στην πρώτη προσπάθεια
    if (retryCount === 0) {
        nextBtn.disabled = true;
        catSelect.disabled = true;
        nextBtn.innerText = "...";
        titleEl.innerText = "Αναζήτηση πίνακα...";
        factEl.innerText = "";
        exitCanvas(); 
    }

    try {
        // Ψάχνουμε σε ασφαλείς σελίδες (1 έως 5) για να σιγουρευτούμε ότι υπάρχουν έργα
        const page = Math.floor(Math.random() * 5) + 1;
        const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${category}&page=${page}&limit=12&fields=id,title,artist_title,image_id`);
        
        if (!res.ok) throw new Error("Net Error");
        
        const data = await res.json();
        
        // Φιλτράρουμε αυτούς που ΕΧΟΥΝ φωτογραφία
        const validArt = data.data.filter(a => a.image_id);
        
        if (validArt.length === 0) {
            throw new Error("No Img on this page");
        }
        
        // Διαλέγουμε έναν τυχαίο πίνακα
        const art = validArt[Math.floor(Math.random() * validArt.length)];

        titleEl.innerText = art.title;
        artistEl.innerText = art.artist_title || "Άγνωστος Καλλιτέχνης";

        // Φορτώνουμε την εικόνα
        await new Promise((resolve, reject) => {
            img.onload = () => resolve();
            img.onerror = () => reject(new Error("Img Load Error"));
            img.src = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;
        });

        img.style.display = "block";
        getAIFact(art.title, art.artist_title);

        // Ξεκλείδωμα αν πέτυχε
        nextBtn.disabled = false;
        catSelect.disabled = false;
        nextBtn.innerText = "ΕΠΟΜΕΝΟ";

    } catch (error) {
        console.warn("Αποτυχία φόρτωσης, προσπάθεια ξανά...", error);
        
        // Αν αποτύχει, ΞΑΝΑΔΟΚΙΜΑΖΕΙ μόνο του μέχρι 3 φορές
        if (retryCount < 3) {
            return getArt(retryCount + 1);
        }
        
        // Αν αποτύχει 3 φορές συνεχόμενα, τότε μόνο δείχνει το σφάλμα
        titleEl.innerText = "Αδυναμία φόρτωσης.";
        artistEl.innerText = "Μουσείο Chicago";
        factEl.innerText = "Η εικόνα δεν βρέθηκε στη βάση του μουσείου. Δοκιμάστε να πατήσετε 'Επόμενο' ή αλλάξτε κατηγορία.";
        
        nextBtn.disabled = false;
        catSelect.disabled = false;
        nextBtn.innerText = "ΕΠΟΜΕΝΟ";
    }
}

async function getAIFact(title, artist) {
    const factEl = document.getElementById('ai-fact');
    factEl.innerText = "Ο AI Curator γράφει...";

    try {
        const response = await fetch("https://art-b2pg.onrender.com/api/groq", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, artist })
        });

        if (!response.ok) throw new Error("AI Error");

        const data = await response.json();
        let text = data.choices[0].message.content;

        text = text
            .replace("🎯 Fun Fact:", "<strong>🎯 Fun Fact:</strong><br>")
            .replace("🎨 Ανάλυση:", "<br><br><strong>🎨 Ανάλυση:</strong><br>")
            .replace("🧠 Context:", "<br><br><strong>🧠 Context:</strong><br>");

        factEl.innerHTML = text;

    } catch (error) {
        factEl.innerText = "Το AI Curator κάνει ένα μικρό διάλειμμα. Πατήστε 'Επόμενο' για νέο έργο!";
    }
}

window.onload = getArt;
</script>

</body>
</html>
