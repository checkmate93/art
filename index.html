<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Curator AI - TV Edition</title>

<style>
/* =========================================
   1. ΒΑΣΙΚΕΣ ΜΕΤΑΒΛΗΤΕΣ & RESET
========================================= */
:root { 
    --bg: #0f172a; 
    --panel-bg: #1e293b; 
    --accent: #fbbf24; 
    --text: #f8fafc; 
    --text-muted: #cbd5e1;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body { 
    font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    font-size: 20px; /* Ελαφρώς μικρότερη βασική γραμματοσειρά */
    width: 100vw;
    height: 100vh;
    overflow: hidden; 
}

/* =========================================
   2. TV SAFE AREA & LAYOUT
========================================= */
#tv-safe-area {
    padding: 30px; 
    width: 100%;
    height: 100%;
    position: relative;
}

#main-grid {
    display: flex;
    flex-direction: row; 
    gap: 30px; 
    height: 100%;
    width: 100%;
}

/* =========================================
   3. ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ (Εικόνα)
========================================= */
.left-panel {
    flex: 6; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--panel-bg);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    box-shadow: var(--shadow);
}

#art-image { 
    width: 100%;
    height: calc(100% - 70px);
    object-fit: contain; 
    border-radius: 12px;
    display: none;
}

#enter-canvas-btn {
    margin-top: 15px;
    background: rgba(15, 23, 42, 0.8);
    color: white;
    border: 2px solid var(--accent);
    padding: 12px 25px; /* Πιο μαζεμένο κουμπί καμβά */
    border-radius: 50px;
    font-size: 18px; /* Μικρότερο font */
    cursor: pointer;
    position: relative;
    z-index: 10; 
}

/* =========================================
   4. ΔΕΞΙΑ ΣΤΗΛΗ (Controls)
========================================= */
.right-panel {
    flex: 4; 
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
}

select { 
    width: 100%; 
    padding: 15px; /* Μικρότερο padding */
    border-radius: 15px; 
    background: #0f172a; 
    color: white; 
    border: 2px solid #334155; 
    font-size: 20px; /* Μικρότερο font στο dropdown */
    cursor: pointer;
    position: relative;
    z-index: 20; 
    flex-shrink: 0;
}

.info-box {
    flex-grow: 1; 
    background: var(--panel-bg);
    border-radius: 20px;
    padding: 25px;
    overflow-y: auto; 
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
}

.info-box::-webkit-scrollbar { width: 8px; }
.info-box::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
.info-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

#art-title { 
    font-size: 28px; /* Μικρότερος τίτλος */
    font-weight: bold; 
    margin-bottom: 8px;
    line-height: 1.2;
}

.artist-name { 
    font-size: 22px; /* Μικρότερο όνομα */
    color: var(--accent); 
    margin-bottom: 15px; 
}

#ai-fact { 
    font-size: 20px; /* Μικρότερο κείμενο AI */
    line-height: 1.6;
    color: var(--text-muted);
}
#ai-fact strong { color: white; }

/* Κάτω Κουμπιά - Αρκετά μικρότερα */
.btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
}

button.control-btn {
    border: none; 
    padding: 18px; /* Αισθητά μικρότερο padding */
    border-radius: 15px; 
    font-size: 20px; /* Μικρότερο font */
    font-weight: bold;
    cursor: pointer; 
    position: relative;
    z-index: 10;
}

#next-btn { background: var(--accent); color: #0f172a; }
#next-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

#auto-btn { background: #334155; color: white; border: 2px solid #475569; }
#auto-btn.active { background: #ef4444; border-color: #ef4444; }

/* =========================================
   5. ΝΕΑ ΛΕΙΤΟΥΡΓΙΑ ΚΑΜΒΑ (Fullscreen Overlay)
========================================= */
#fullscreen-overlay {
    display: none; /* Κρυμμένο αρχικά */
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black; /* Μαύρο φόντο σαν κάδρο */
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

#fullscreen-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

#fixed-back-btn {
    position: absolute; 
    top: 30px; 
    left: 30px; 
    background: rgba(239, 68, 68, 0.9);
    color: white;
    padding: 15px 30px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    cursor: pointer;
    z-index: 10000;
}
#fixed-back-btn:hover { background: #dc2626; }
</style>
</head>

<body>

<!-- ΤΟ OVERLAY ΚΑΜΒΑ (Απόλυτα ασφαλής μέθοδος) -->
<div id="fullscreen-overlay">
    <button id="fixed-back-btn" onclick="exitCanvas()">⬅ ΕΠΙΣΤΡΟΦΗ</button>
    <img id="fullscreen-image">
</div>

<div id="tv-safe-area">
    <!-- Το Κυρίως Grid -->
    <div id="main-grid">
        
        <!-- Αριστερά: Εικόνα -->
        <div class="left-panel">
            <img id="art-image">
            <button id="enter-canvas-btn" onclick="enterCanvas()">🔍 Προβολή σε Καμβά</button>
        </div>

        <!-- Δεξιά: Controls & Πληροφορίες -->
        <div class="right-panel">
            
            <select id="category-select" onchange="getArt()">
                <option value="Impressionism">🎨 Ιμπρεσιονισμός</option>
                <option value="Renaissance">🏰 Αναγέννηση</option>
                <option value="Ancient Greek Art">🏺 Αρχαία Ελληνική Τέχνη</option>
                <option value="Japanese Art">🌊 Ιαπωνική Τέχνη</option>
                <option value="Surrealism">👁️ Σουρεαλισμός</option>
            </select>

            <div class="info-box">
                <h1 id="art-title">Curiosity Gallery</h1>
                <div id="artist-name" class="artist-name">Επιλέξτε κατηγορία...</div>
                <div id="ai-fact">Το AI Curator είναι έτοιμο.</div>
            </div>

            <div class="btn-group">
                <button id="next-btn" class="control-btn" onclick="getArt()">ΕΠΟΜΕΝΟ ΕΡΓΟ</button>
                <button id="auto-btn" class="control-btn" onclick="toggleAutoMode()">⏱️ ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ (1.5 λεπτό)</button>
            </div>

        </div>
    </div>
</div>

<script>
/* =========================================
   ΝΕΑ ΛΕΙΤΟΥΡΓΙΑ ΚΑΜΒΑ (Ασφαλής εμφάνιση)
========================================= */
function enterCanvas() {
    const mainImg = document.getElementById('art-image');
    const overlay = document.getElementById('fullscreen-overlay');
    const fullImg = document.getElementById('fullscreen-image');
    
    // Αντιγράφει το URL της εικόνας και δείχνει την κρυφή οθόνη
    fullImg.src = mainImg.src;
    overlay.style.display = 'flex';
}

function exitCanvas() {
    const overlay = document.getElementById('fullscreen-overlay');
    // Κρύβει την οθόνη του καμβά (χωρίς να πειράζει το grid)
    overlay.style.display = 'none';
}

/* =========================================
   ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ (Ρυθμίστηκε στο 1.5 λεπτό)
========================================= */
let autoInterval;
let isAutoMode = false;

function toggleAutoMode() {
    const btn = document.getElementById('auto-btn');
    isAutoMode = !isAutoMode;

    if (isAutoMode) {
        btn.classList.add('active');
        btn.innerText = "🛑 ΔΙΑΚΟΠΗ ΕΝΑΛΛΑΓΗΣ";
        getArt(); 
        // 1.5 λεπτό = 90.000 χιλιοστά του δευτερολέπτου
        autoInterval = setInterval(getArt, 90000); 
    } else {
        btn.classList.remove('active');
        btn.innerText = "⏱️ ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ (1.5 λεπτό)";
        clearInterval(autoInterval);
    }
}

/* =========================================
   API & ΦΟΡΤΩΣΗ ΕΡΓΩΝ
========================================= */
async function getArt() {
    const nextBtn = document.getElementById('next-btn');
    const catSelect = document.getElementById('category-select');
    const img = document.getElementById('art-image');
    const category = catSelect.value;
    
    const titleEl = document.getElementById('art-title');
    const artistEl = document.getElementById('artist-name');
    const factEl = document.getElementById('ai-fact');

    // Κλείδωμα
    nextBtn.disabled = true;
    catSelect.disabled = true;
    nextBtn.innerText = "Φόρτωση...";
    titleEl.innerText = "Αναζήτηση πίνακα...";
    factEl.innerText = "";
    
    // Αν αλλάξει έργο αυτόματα, βγαίνει από τον καμβά
    exitCanvas(); 

    try {
        const page = Math.floor(Math.random() * 30) + 1;
        const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${category}&page=${page}&limit=12&fields=id,title,artist_title,image_id`);
        
        if (!res.ok) throw new Error("Αποτυχία δικτύου");
        
        const data = await res.json();
        const validArt = data.data.filter(a => a.image_id);
        
        if (validArt.length === 0) throw new Error("Δεν βρέθηκαν εικόνες");
        
        const art = validArt[Math.floor(Math.random() * validArt.length)];

        titleEl.innerText = art.title;
        artistEl.innerText = art.artist_title || "Άγνωστος Καλλιτέχνης";

        await new Promise((resolve, reject) => {
            img.onload = () => resolve();
            img.onerror = () => reject(new Error("Η εικόνα απέτυχε"));
            img.src = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;
        });

        img.style.display = "block";
        getAIFact(art.title, art.artist_title);

    } catch (error) {
        console.error("Σφάλμα:", error);
        titleEl.innerText = "Σφάλμα. Πατήστε Επόμενο.";
        factEl.innerText = "Υπήρξε πρόβλημα με τη φόρτωση. Δοκιμάστε ξανά.";
    } finally {
        nextBtn.disabled = false;
        catSelect.disabled = false;
        nextBtn.innerText = "ΕΠΟΜΕΝΟ ΕΡΓΟ";
    }
}

async function getAIFact(title, artist) {
    const factEl = document.getElementById('ai-fact');
    factEl.innerText = "Ο AI Curator μελετά το έργο...";

    try {
        const response = await fetch("https://art-b2pg.onrender.com/api/groq", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, artist })
        });

        if (!response.ok) throw new Error("AI Error");

        const data = await response.json();
        let text = data.choices[0].message.content;

        text = text
            .replace("🎯 Fun Fact:", "<strong>🎯 Fun Fact:</strong><br>")
            .replace("🎨 Ανάλυση:", "<br><br><strong>🎨 Ανάλυση:</strong><br>")
            .replace("🧠 Context:", "<br><br><strong>🧠 Context:</strong><br>");

        factEl.innerHTML = text;

    } catch (error) {
        factEl.innerText = "Το AI Curator κάνει διάλειμμα. Δοκιμάστε άλλο έργο.";
    }
}

// Εκκίνηση με το άνοιγμα της σελίδας
window.onload = getArt;
</script>

</body>
</html>
