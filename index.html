<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Curator AI - TV Edition</title>

<style>
/* =========================================
   1. ΒΑΣΙΚΕΣ ΜΕΤΑΒΛΗΤΕΣ & RESET
========================================= */
:root { 
    --bg: #0f172a; 
    --panel-bg: #1e293b; 
    --accent: #fbbf24; 
    --text: #f8fafc; 
    --text-muted: #cbd5e1;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body { 
    font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    font-size: 24px; /* Μεγάλα γράμματα για τηλεόραση */
    width: 100vw;
    height: 100vh;
    overflow: hidden; /* Κλειδώνει το page scroll */
}

/* =========================================
   2. TV SAFE AREA & LAYOUT
========================================= */
#tv-safe-area {
    padding: 40px; /* Safe Area για να μην κόβονται στοιχεία στις άκρες */
    width: 100%;
    height: 100%;
    position: relative;
}

#main-grid {
    display: flex;
    flex-direction: row; /* Side-by-side για TV */
    gap: 40px; /* 'Αέρας' (Padding) ανάμεσα στις στήλες */
    height: 100%;
    width: 100%;
}

/* Αν η οθόνη είναι μικρή (π.χ. κινητό), γίνεται στήλη */
@media (max-width: 1024px) {
    #main-grid { flex-direction: column; overflow-y: auto; }
}

/* =========================================
   3. ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ (Εικόνα)
========================================= */
.left-panel {
    flex: 6; /* 60% πλάτος */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--panel-bg);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    box-shadow: var(--shadow);
}

#art-image { 
    width: 100%;
    height: calc(100% - 80px); /* Αφήνει χώρο για το κουμπί */
    object-fit: contain; /* Δεν παραμορφώνει, δεν κόβει */
    border-radius: 12px;
    display: none;
}

#enter-canvas-btn {
    margin-top: 20px;
    background: rgba(15, 23, 42, 0.8);
    color: white;
    border: 2px solid var(--accent);
    padding: 15px 30px;
    border-radius: 50px;
    font-size: 24px;
    cursor: pointer;
    position: relative;
    z-index: 10; /* Clickability fix */
}

/* =========================================
   4. ΔΕΞΙΑ ΣΤΗΛΗ (Controls)
========================================= */
.right-panel {
    flex: 4; /* 40% πλάτος */
    display: flex;
    flex-direction: column;
    gap: 20px;
    height: 100%;
}

/* Dropdown - Z-index fix */
select { 
    width: 100%; 
    padding: 20px; 
    border-radius: 15px; 
    background: #0f172a; 
    color: white; 
    border: 2px solid #334155; 
    font-size: 26px;
    cursor: pointer;
    position: relative;
    z-index: 20; /* Πάνω από όλα για να πιάνει το κλικ του remote */
    flex-shrink: 0;
}

/* Container κειμένων */
.info-box {
    flex-grow: 1; /* Πιάνει τον διαθέσιμο χώρο */
    background: var(--panel-bg);
    border-radius: 20px;
    padding: 30px;
    overflow-y: auto; /* Scroll αν γεμίσει */
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
}

/* TV Scrollbar */
.info-box::-webkit-scrollbar { width: 10px; }
.info-box::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
.info-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

#art-title { 
    font-size: 36px; /* Μεγάλο font */
    font-weight: bold; 
    margin-bottom: 10px;
    line-height: 1.2;
}

.artist-name { 
    font-size: 28px;
    color: var(--accent); 
    margin-bottom: 20px; 
}

#ai-fact { 
    font-size: 24px;
    line-height: 1.6;
    color: var(--text-muted);
}
#ai-fact strong { color: white; }

/* Κουμπιά (Κάτω μέρος) */
.btn-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
    flex-shrink: 0;
}

button {
    border: none; 
    padding: 25px;
    border-radius: 15px; 
    font-size: 26px;
    font-weight: bold;
    cursor: pointer; 
    position: relative;
    z-index: 10;
}

#next-btn { 
    background: var(--accent); 
    color: #0f172a; 
}
#next-btn:disabled { 
    background: #475569; 
    color: #94a3b8; 
    cursor: not-allowed; 
}

#auto-btn { background: #334155; color: white; }
#auto-btn.active { background: #ef4444; }

/* =========================================
   5. ΛΕΙΤΟΥΡΓΙΑ CANVAS (Fullscreen)
========================================= */
#fixed-back-btn {
    display: none;
    position: fixed; /* Πάντα σταθερό */
    top: 40px; 
    left: 40px; 
    z-index: 9999; /* Το πιο ψηλό z-index σε όλο το app */
    background: rgba(239, 68, 68, 0.9);
    color: white;
    padding: 20px 40px;
    font-size: 28px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
}

body.canvas-mode #main-grid { display: none; } /* Κρύβει το grid */
body.canvas-mode #fixed-back-btn { display: block; } /* Δείχνει το Back */
body.canvas-mode {
    background: black; /* Μαύρο φόντο για τον πίνακα */
}
body.canvas-mode #canvas-image-container {
    display: flex;
    width: 100vw;
    height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 40px;
}
body.canvas-mode #art-image {
    display: block;
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="tv-safe-area">
    
    <!-- Fixed Κουμπί Επιστροφής (Αρχικά κρυμμένο) -->
    <button id="fixed-back-btn" onclick="exitCanvas()">⬅ ΕΠΙΣΤΡΟΦΗ</button>

    <!-- Το Κυρίως Grid -->
    <div id="main-grid">
        
        <!-- Αριστερά: Εικόνα -->
        <div class="left-panel">
            <img id="art-image">
            <button id="enter-canvas-btn" onclick="enterCanvas()">🔍 Προβολή σε Καμβά</button>
        </div>

        <!-- Δεξιά: Controls & Πληροφορίες -->
        <div class="right-panel">
            
            <select id="category-select" onchange="getArt()">
                <option value="Impressionism">🎨 Ιμπρεσιονισμός</option>
                <option value="Renaissance">🏰 Αναγέννηση</option>
                <option value="Ancient Greek Art">🏺 Αρχαία Ελληνική Τέχνη</option>
                <option value="Japanese Art">🌊 Ιαπωνική Τέχνη</option>
                <option value="Surrealism">👁️ Σουρεαλισμός</option>
            </select>

            <div class="info-box">
                <h1 id="art-title">Curiosity Gallery</h1>
                <div id="artist-name" class="artist-name">Επιλέξτε κατηγορία...</div>
                <div id="ai-fact">Το AI Curator είναι έτοιμο.</div>
            </div>

            <div class="btn-group">
                <button id="next-btn" onclick="getArt()">ΕΠΟΜΕΝΟ ΈΡΓΟ</button>
                <button id="auto-btn" onclick="toggleAutoMode()">⏱️ ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ</button>
            </div>

        </div>
    </div>

</div>

<script>
/* =========================================
   ΛΕΙΤΟΥΡΓΙΑ ΚΑΜΒΑ (Fullscreen Fix)
========================================= */
function enterCanvas() {
    document.body.classList.add('canvas-mode');
    // Μεταφέρουμε την εικόνα εκτός grid για να πιάσει όλη την οθόνη
    const img = document.getElementById('art-image');
    let container = document.getElementById('canvas-image-container');
    if (!container) {
        container = document.createElement('div');
        container.id = 'canvas-image-container';
        document.body.appendChild(container);
    }
    container.appendChild(img);
}

function exitCanvas() {
    document.body.classList.remove('canvas-mode');
    // Επιστροφή της εικόνας στο grid
    const img = document.getElementById('art-image');
    document.querySelector('.left-panel').insertBefore(img, document.getElementById('enter-canvas-btn'));
}

/* =========================================
   ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ
========================================= */
let autoInterval;
let isAutoMode = false;

function toggleAutoMode() {
    const btn = document.getElementById('auto-btn');
    isAutoMode = !isAutoMode;

    if (isAutoMode) {
        btn.classList.add('active');
        btn.innerText = "🛑 ΔΙΑΚΟΠΗ (3 λεπτά)";
        getArt(); 
        autoInterval = setInterval(getArt, 180000); 
    } else {
        btn.classList.remove('active');
        btn.innerText = "⏱️ ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ";
        clearInterval(autoInterval);
    }
}

/* =========================================
   API & ERROR HANDLING (Το "Ξεκλείδωμα")
========================================= */
async function getArt() {
    const nextBtn = document.getElementById('next-btn');
    const catSelect = document.getElementById('category-select');
    const img = document.getElementById('art-image');
    const category = catSelect.value;
    
    const titleEl = document.getElementById('art-title');
    const artistEl = document.getElementById('artist-name');
    const factEl = document.getElementById('ai-fact');

    // 1. ΚΛΕΙΔΩΜΑ UI
    nextBtn.disabled = true;
    catSelect.disabled = true;
    nextBtn.innerText = "Φόρτωση...";
    titleEl.innerText = "Αναζήτηση πίνακα...";
    factEl.innerText = "";
    exitCanvas();

    try {
        // 2. FETCH ΑΠΟ CHICAGO ART INSTITUTE
        const page = Math.floor(Math.random() * 30) + 1;
        const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${category}&page=${page}&limit=12&fields=id,title,artist_title,image_id`);
        
        if (!res.ok) throw new Error("Αποτυχία δικτύου");
        
        const data = await res.json();
        const validArt = data.data.filter(a => a.image_id);
        
        if (validArt.length === 0) throw new Error("Δεν βρέθηκαν εικόνες");
        
        const art = validArt[Math.floor(Math.random() * validArt.length)];

        // Ενημέρωση Κειμένων
        titleEl.innerText = art.title;
        artistEl.innerText = art.artist_title || "Άγνωστος Καλλιτέχνης";

        // 3. PROMISE ΓΙΑ ΤΗ ΦΟΡΤΩΣΗ ΤΗΣ ΕΙΚΟΝΑΣ 
        // Αν δεν φορτώσει η εικόνα, πετάει error και πάει στο catch!
        await new Promise((resolve, reject) => {
            img.onload = () => resolve();
            img.onerror = () => reject(new Error("Η εικόνα απέτυχε να φορτώσει"));
            img.src = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;
        });

        img.style.display = "block";

        // Αν όλα πήγαν καλά με την εικόνα, ξεκινάμε το AI
        getAIFact(art.title, art.artist_title);

    } catch (error) {
        console.error("Σφάλμα:", error);
        titleEl.innerText = "Σφάλμα. Πατήστε Επόμενο.";
        factEl.innerText = "Υπήρξε πρόβλημα με τη φόρτωση του πίνακα. Δοκιμάστε ξανά.";
    } finally {
        // 4. TO ΚΡΙΣΙΜΟ ΒΗΜΑ (FINALLY): 
        // Ξεκλειδώνει ΠΑΝΤΑ, είτε πέτυχε το try, είτε έσκασε στο catch
        nextBtn.disabled = false;
        catSelect.disabled = false;
        nextBtn.innerText = "ΕΠΟΜΕΝΟ ΕΡΓΟ";
    }
}

async function getAIFact(title, artist) {
    const factEl = document.getElementById('ai-fact');
    factEl.innerText = "Ο AI Curator μελετά το έργο...";

    try {
        // ΧΡΗΣΗ ΤΟΥ ΣΩΣΤΟΥ RENDER URL ΣΟΥ!
        const response = await fetch("https://art-b2pg.onrender.com/api/groq", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, artist })
        });

        if (!response.ok) throw new Error("AI Error");

        const data = await response.json();
        let text = data.choices[0].message.content;

        text = text
            .replace("🎯 Fun Fact:", "<strong>🎯 Fun Fact:</strong><br>")
            .replace("🎨 Ανάλυση:", "<br><br><strong>🎨 Ανάλυση:</strong><br>")
            .replace("🧠 Context:", "<br><br><strong>🧠 Context:</strong><br>");

        factEl.innerHTML = text;

    } catch (error) {
        factEl.innerText = "Το AI Curator κάνει διάλειμμα. Δοκιμάστε άλλο έργο.";
    }
}

// Εκκίνηση
window.onload = getArt;
</script>

</body>
</html>
